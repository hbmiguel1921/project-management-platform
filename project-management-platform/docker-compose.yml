version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: pm_postgres
    environment:
      POSTGRES_DB: project_management
      POSTGRES_USER: pm_user
      POSTGRES_PASSWORD: pm_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    networks:
      - pm_network

  redis:
    image: redis:7-alpine
    container_name: pm_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - pm_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pm_backend
    environment:
      - DB_HOST=postgres
      - DB_USER=pm_user
      - DB_PASSWORD=pm_password
      - DB_NAME=project_management
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=your-super-secret-jwt-key
      - APP_ENV=development
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend:/app
      - ./logs:/app/logs
    networks:
      - pm_network
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pm_frontend
    ports:
      - "4200:4200"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - pm_network
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: pm_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deployment/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./deployment/nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    networks:
      - pm_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  pm_network:
    driver: bridge
